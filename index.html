<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Mika, dein Weg</title><style>:root{--bg:#f4efe8;--card:#fffaf3;--ink:#141414;--muted:#71695f;--line:#dfd3c2;--good:#267a55;--ok:#bd8427;--bad:#b84a3a;--soft:#f1e8da;--shadow:0 10px 28px rgba(42,32,20,.07)}*{box-sizing:border-box}html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden}body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.38}.wrap{width:100%;max-width:980px;margin:0 auto;padding:14px 14px 54px}.topbar{position:sticky;top:0;z-index:50;margin:0 -14px 12px;padding:10px 14px;background:rgba(244,238,230,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.toprow{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand{font-size:21px;font-weight:950;letter-spacing:-.05em}.nextline{font-size:13px;color:var(--muted);font-weight:800;line-height:1.25;margin-top:3px}.scorepill{background:#111;color:#fff;border-radius:999px;padding:8px 12px;font-weight:950;white-space:nowrap}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:12px;width:100%;max-width:100%}.summary{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.status{font-size:34px;line-height:.92;font-weight:950;letter-spacing:-.06em}.date{font-size:14px;color:var(--muted);font-weight:750;margin-top:6px}.ring{--p:0;width:88px;height:88px;border-radius:50%;background:conic-gradient(var(--good) calc(var(--p)*1%),#eadfce 0);display:grid;place-items:center}.inner{width:66px;height:66px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center;font-weight:950;font-size:20px}.progressTop{display:flex;justify-content:space-between;font-size:13px;font-weight:900;margin-bottom:7px}.bar{height:10px;background:#eadfce;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--good),#111);border-radius:999px}.days{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 4px;margin-top:12px}.day{min-width:54px;border:1px solid var(--line);border-radius:13px;background:#faf4ea;padding:7px 6px;text-align:center;font-size:12px;font-weight:900;cursor:pointer}.day.active{background:#111;color:#fff}.trend{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 4px}.trendDay{min-width:74px;border:1px solid var(--line);border-radius:16px;background:#faf4ea;padding:10px 9px;cursor:pointer}.trendDay.active{background:#111;color:#fff}.trendDay.badish{border-color:#e3b5a9}.trendDay.goodish{border-color:#b9d9c9}.trendLabel{font-size:12px;font-weight:950}.trendScore{font-size:20px;font-weight:950;letter-spacing:-.05em;margin-top:5px}.trendBar{height:6px;background:#eadfce;border-radius:999px;overflow:hidden;margin-top:8px}.trendBar span{display:block;height:100%;border-radius:999px;background:#111}.insights{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.insight{border:1px solid var(--line);border-radius:16px;background:#faf4ea;padding:12px}.insight strong{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}.insight p{margin:0;font-size:14px;font-weight:750}.reality{background:#111;color:#fff}.reality small{display:block;color:#bbb;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}.quote{font-size:28px;line-height:1.04;font-weight:950;letter-spacing:-.055em}.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mini h3,.log h2{margin:0 0 10px;font-size:18px;letter-spacing:-.03em}.mini p{margin:0;color:var(--muted);font-size:14px}.checks{display:flex;flex-wrap:wrap;gap:7px}.chip{border:1px solid var(--line);border-radius:999px;padding:7px 9px;font-size:12px;font-weight:850;background:#faf4ea}.chip.done{background:#e4f1ea;color:var(--good)}.chip.open{background:#fff1d5;color:var(--ok)}.timeline{display:grid;gap:9px}.entry{border:1px solid var(--line);background:#faf7f1;border-radius:16px;padding:12px}.entryTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.time{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.06em}.entry h3{margin:3px 0 4px;font-size:16px}.entry p{margin:0;color:var(--muted);font-size:14px}.badge{border-radius:999px;padding:6px 9px;font-size:12px;font-weight:950;white-space:nowrap}.good{background:#e4f1ea;color:var(--good)}.ok{background:#fff1d5;color:var(--ok)}.bad{background:#fbe5df;color:var(--bad)}.loader{padding:32px;color:var(--muted)}@media(max-width:720px){.wrap{padding:0 10px 42px}.topbar{margin:0 -10px 10px;padding:11px 10px}.brand{font-size:20px}.nextline{font-size:12px}.scorepill{padding:7px 10px}.card{border-radius:18px;padding:14px;margin-bottom:10px}.summary{grid-template-columns:1fr 78px}.status{font-size:30px}.ring{width:78px;height:78px}.inner{width:58px;height:58px;font-size:18px}.split,.insights{grid-template-columns:1fr}.quote{font-size:25px}.days{display:none}.entryTop{display:block}.badge{display:inline-block;margin-top:8px}.trendDay{min-width:70px}h1,h2,h3,p{overflow-wrap:anywhere}.card:first-of-type{margin-top:10px}}</style></head><body><div id="app" class="wrap"><div class="loader">Cockpit lädt…</div></div><script>const labels={wasser:'Wasser',protein:'Protein',bewegung:'Bewegung',kraftreiz:'Kraftreiz',keinZuckerkaffee:'Kein Zuckerkaffee',keinSnackMuell:'Kein Snack-Müll',abendKontrolliert:'Abend kontrolliert',schlafVorbereiten:'Schlaf vorbereiten'};let DATA;function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('de-AT',{weekday:'short',day:'2-digit',month:'short'}).replaceAll('.','')}function score(d){return d.score??0}function pct(d){return Math.max(0,Math.min(100,score(d)*10))}function scoreText(d){return d.score==null?'offen':d.score+'/10'}function cls(t){return t==='bad'?'bad':t==='ok'?'ok':'good'}function avg(days){const s=days.filter(d=>d.score!=null).map(d=>d.score);return s.length?(s.reduce((a,b)=>a+b,0)/s.length).toFixed(1):'-'}function streak(days){let n=0;for(const day of days){if(day.score>=8)n++;else if(day.score!=null)n=0}return n}function trendText(days){const s=days.filter(d=>d.score!=null);if(s.length<2)return 'Noch zu wenig Verlauf.';const a=s[s.length-2].score,b=s[s.length-1].score;if(b>a)return 'Trend steigt. Weiter stabilisieren.';if(b<a)return 'Trend fällt. Abend im Fokus.';return 'Trend stabil. Nicht öffnen.'}function eveningRisk(days){const recent=days.slice(-4);const bad=recent.filter(d=>(d.summary||'').toLowerCase().includes('abend')||d.score<7).length;return bad>=2?'Warnung: Abend-/Snackmuster sichtbar. Heute aktiv schließen.':'Kein akuter Alarm. Trotzdem Abend sauber halten.'}function derive(current,data){const c=current.checks||{};const done=Object.entries(c).filter(([k,v])=>v).map(([k])=>labels[k]);const open=Object.entries(labels).filter(([k])=>!c[k]).map(([k,v])=>v);let next='Leicht essen. Kein Snack aus Gewohnheit.';if(!c.protein)next='Protein sichern: Skyr, Shake, Huhn oder Eier.';else if(!c.bewegung)next='Bewegung setzen: 20–30 Minuten oder kurzer Kraftreiz.';else if(!c.abendKontrolliert)next='Abend kontrollieren: leicht essen, kein Snack aus Gewohnheit.';else if(!c.schlafVorbereiten)next='Runterfahren: Wasser, Bildschirm reduzieren, Schlaf vorbereiten.';let quote='Nicht perfekt. Stabil.';if(!c.abendKontrolliert)quote='Heute wird am Abend gewonnen.';if(current.summary&&current.summary.toLowerCase().includes('reset'))quote='Reset heißt: heute sauber bleiben.';let top=`${streak(data.days)} starke Tage in Folge. Ø Score ${avg(data.days)}.`;let step=current.score>=8?'Kleiner Schritt: ruhig stabil bleiben. Nicht kompensieren.':'Kleiner Schritt: eine saubere Entscheidung jetzt.';return{done,open,next,quote,top,step,doneCount:done.length,total:Object.keys(labels).length}}function render(dayId){const data=DATA;const current=data.days.find(d=>d.date===dayId)||data.days.find(d=>d.status==='current')||data.days[0];const d=derive(current,data);const scored=data.days.filter(x=>x.score!=null);const last7=data.days.slice(-7);document.getElementById('app').innerHTML=`<div class="topbar"><div class="toprow"><div><div class="brand">Mika, dein Weg.</div><div class="nextline">${d.next}</div></div><div class="scorepill">${scoreText(current)}</div></div></div><section class="card summary"><div><div class="status">${current.score>=8?'Solide Basis.':current.score>=6?'Wacklig, aber offen.':'Offener Tag.'}</div><div class="date">${fmtDate(current.date)} · ${current.status==='current'?'laufend':'Historie'}</div><div style="margin-top:14px"><div class="progressTop"><span>Heute geschafft</span><span>${d.doneCount}/${d.total}</span></div><div class="bar"><span style="width:${(d.doneCount/d.total)*100}%"></span></div></div></div><div class="ring" style="--p:${pct(current)}"><div class="inner">${scoreText(current)}</div></div></section><section class="card"><div class="progressTop"><span>7-Tage-Verlauf</span><span>${avg(scored)}</span></div><div class="trend">${last7.map(x=>`<div onclick="render('${x.date}')" class="trendDay ${x.date===current.date?'active':''} ${score(x)>=8?'goodish':score(x)<7&&x.score!=null?'badish':''}"><div class="trendLabel">${x.label}</div><div class="trendScore">${scoreText(x)}</div><div class="trendBar"><span style="width:${pct(x)}%"></span></div></div>`).join('')}</div></section><section class="card"><div class="insights"><div class="insight"><strong>Trend</strong><p>${trendText(scored)}</p></div><div class="insight"><strong>Muster</strong><p>${eveningRisk(scored)}</p></div><div class="insight"><strong>Regel</strong><p>Historie bleibt ab jetzt append-only. Keine Tage mehr löschen.</p></div></div></section><section class="card reality"><small>Reality</small><div class="quote">${d.quote}</div></section><section class="split"><div class="card mini"><h3>Wo du stehst</h3><p>${d.top}</p></div><div class="card mini"><h3>Nächster kleiner Schritt</h3><p>${d.step}</p></div></section><section class="card log"><h2>Tagesprotokoll</h2><div class="timeline">${current.entries&&current.entries.length?current.entries.map(e=>`<div class="entry"><div class="entryTop"><div><div class="time">${e.time}</div><h3>${e.title}</h3><p>${e.text}</p></div><span class="badge ${cls(e.type)}">${e.rating}</span></div></div>`).join(''):'<p class="small">Noch keine Einträge.</p>'}</div></section><section class="card mini"><h3>Checks</h3><div class="checks">${Object.keys(labels).map(k=>`<span class="chip ${current.checks&&current.checks[k]?'done':'open'}">${labels[k]}</span>`).join('')}</div></section>`}fetch('data.json?ts='+Date.now()).then(r=>r.json()).then(d=>{DATA=d;render(d.currentDay)}).catch(()=>{document.getElementById('app').innerHTML='<div class="card">data.json konnte nicht geladen werden.</div>'})</script></body></html>
