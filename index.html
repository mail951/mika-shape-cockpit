<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mika, dein Weg</title><style>:root{--bg:#f4efe6;--card:#fffaf3;--ink:#171717;--muted:#756f65;--line:#dfd5c6;--good:#287956;--ok:#bd8427;--bad:#b84a3a;--soft:#eee5d8;--shadow:0 18px 45px rgba(44,34,22,.08)}*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 5% 0%,#fff8eb 0,#f4efe6 36%,#eee6da 100%);color:var(--ink);line-height:1.45}.wrap{max-width:1220px;margin:0 auto;padding:28px 18px 60px}.top{display:grid;grid-template-columns:1.35fr .65fr;gap:18px;margin-bottom:18px}.hero,.scorebox,.card,.tab{background:rgba(255,250,243,.94);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow)}.hero{padding:30px}.scorebox{padding:24px}.eyebrow{font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}h1{margin:0 0 10px;font-size:clamp(38px,5vw,66px);letter-spacing:-.06em;line-height:.92}.sub{color:var(--muted);font-size:17px;max-width:760px}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}.pill{border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:8px 12px;font-size:13px;color:#373029;font-weight:800}.score-ring{--p:90;width:174px;height:174px;border-radius:50%;background:conic-gradient(var(--good) calc(var(--p)*1%),#eadfce 0);display:grid;place-items:center;margin:auto}.score-inner{width:128px;height:128px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center}.bigscore{font-size:46px;font-weight:950;letter-spacing:-.06em}.scorelabel{color:var(--muted);font-size:13px;font-weight:800}.scoretext{text-align:center;font-weight:900;margin-top:16px}.footer-note{text-align:center;margin-top:8px;color:var(--muted);font-size:13px}.tabs{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;margin-bottom:18px}.tab{padding:14px 12px;min-height:104px;cursor:pointer;transition:.18s}.tab:hover{transform:translateY(-2px)}.tab.active{border:2px solid #111;background:#fff}.day{font-weight:950}.date{color:var(--muted);font-size:12px;margin-top:2px}.mini-score{margin-top:10px;font-weight:950;font-size:20px}.bar{height:7px;border-radius:99px;background:#eadfce;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;background:var(--good);border-radius:99px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}.card{padding:22px}.span-8{grid-column:span 8}.span-4{grid-column:span 4}.span-12{grid-column:span 12}.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}h2{margin:0;font-size:21px;letter-spacing:-.03em}.tag{font-size:12px;font-weight:900;border-radius:999px;padding:7px 11px;background:#111;color:white}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.kpi{background:#faf4ea;border:1px solid var(--line);border-radius:18px;padding:14px}.kpi .num{font-size:26px;font-weight:950;letter-spacing:-.04em}.kpi .lab{font-size:12px;color:var(--muted);font-weight:800}.chart{height:160px;display:flex;align-items:end;gap:10px;padding:14px;background:#faf4ea;border:1px solid var(--line);border-radius:18px}.col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px}.colbar{width:100%;max-width:34px;background:linear-gradient(180deg,#111,#6f665b);border-radius:9px 9px 3px 3px;min-height:4px}.collabel{font-size:11px;color:var(--muted);font-weight:850}.timeline{display:grid;gap:12px}.entry{display:grid;grid-template-columns:92px 1fr 78px;gap:14px;padding:15px;border-radius:18px;background:#faf7f1;border:1px solid var(--line);align-items:start}.time{font-weight:950;color:#332f29}.entry h3{margin:0 0 4px;font-size:16px}.entry p{margin:0;color:var(--muted);font-size:14px}.badge{justify-self:end;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:950;text-align:center;white-space:nowrap}.good{color:var(--good);background:#e4f1ea}.ok{color:var(--ok);background:#fff1d5}.bad{color:var(--bad);background:#fbe5df}.checks{display:grid;grid-template-columns:1fr;gap:10px}.check{padding:12px;border-radius:15px;border:1px solid var(--line);background:#faf7f1;display:flex;justify-content:space-between;align-items:center;gap:10px;font-weight:850;font-size:14px}.dot{width:12px;height:12px;border-radius:50%;background:#cfc4b2}.dot.done{background:var(--good)}.dot.open{background:var(--ok)}.summary{background:#111;color:white;border-radius:20px;padding:20px}.summary p{color:#ddd;margin:8px 0 0}.rules{display:grid;gap:10px}.rule{padding:14px;border-radius:16px;background:#faf4ea;border:1px solid var(--line);font-size:14px}.rule strong{display:block;margin-bottom:3px}.hint{font-size:12px;color:var(--muted);font-weight:800}.loader{padding:40px;color:var(--muted)}@media(max-width:900px){.top{grid-template-columns:1fr}.span-8,.span-4{grid-column:span 12}.tabs{grid-template-columns:repeat(2,minmax(0,1fr))}.entry{grid-template-columns:1fr}.badge{justify-self:start}.kpis{grid-template-columns:repeat(2,1fr)}}</style></head><body><div id="app" class="wrap"><div class="loader">Cockpit lädt…</div></div><script>const labels={wasser:'Wasser',protein:'Protein',bewegung:'Bewegung',kraftreiz:'Kraftreiz',keinZuckerkaffee:'Kein Zuckerkaffee',keinSnackMuell:'Kein Snack-Müll',abendKontrolliert:'Abend kontrolliert',schlafVorbereiten:'Schlaf vorbereiten'};let DATA,SELECTED;function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('de-AT',{day:'2-digit',month:'short'}).replace('.','.') }function score(d){return d.score??0}function scoreText(d){return d.score==null?'offen':d.score+'/10'}function cls(t){return t==='bad'?'bad':t==='ok'?'ok':'good'}function pct(d){return Math.max(0,Math.min(100,score(d)*10))}function avg(days){const s=days.filter(d=>d.score!=null).map(d=>d.score);return s.length?(s.reduce((a,b)=>a+b,0)/s.length).toFixed(1):'-'}function render(dayId){const data=DATA;const current=data.days.find(d=>d.date===dayId)||data.days.find(d=>d.status==='current')||data.days[0];SELECTED=current.date;const checks=current.checks||{};const done=Object.values(checks).filter(Boolean).length;document.getElementById('app').innerHTML=`<section class="top"><div class="hero"><div class="eyebrow">Dein Weg · Tag für Tag</div><h1>Mika, dein Weg.</h1><div class="sub">Ein persönliches Cockpit für Ernährung, Bewegung und saubere Entscheidungen. Nicht perfekt sein — sichtbar besser werden.</div><div class="meta">${data.profile.principles.map(p=>`<div class="pill">${p}</div>`).join('')}<div class="pill">${data.profile.goal}</div><div class="pill">${data.profile.age} Jahre</div></div></div><aside class="scorebox"><div class="score-ring" style="--p:${pct(current)}"><div class="score-inner"><div><div class="scorelabel">Score</div><div class="bigscore">${scoreText(current)}</div></div></div></div><div class="scoretext">${current.score>=9?'Starker Kurs. Jetzt nicht kippen.':current.score>=7?'Solide. Fokus halten.':'Tag offen.'}</div><div class="footer-note">${current.label}. ${fmtDate(current.date)} · laufend aktualisiert</div></aside></section><section class="tabs">${data.days.map(d=>`<div class="tab ${d.date===current.date?'active':''}" onclick="render('${d.date}')"><div class="day">${d.label}</div><div class="date">${fmtDate(d.date)}</div><div class="mini-score">${scoreText(d)}</div><div class="bar"><span style="width:${pct(d)}%"></span></div></div>`).join('')}</section><main class="grid"><section class="card span-12"><div class="section-title"><h2>Wochen-Pulse</h2><span class="hint">Score-Verlauf</span></div><div class="kpis"><div class="kpi"><div class="num">${avg(data.days)}</div><div class="lab">Ø Score</div></div><div class="kpi"><div class="num">${data.days.filter(d=>d.score>=8).length}</div><div class="lab">starke Tage</div></div><div class="kpi"><div class="num">${current.entries.length}</div><div class="lab">Einträge heute</div></div><div class="kpi"><div class="num">${done}/8</div><div class="lab">Daily Checks</div></div></div><div class="chart">${data.days.map(d=>`<div class="col"><div class="colbar" style="height:${pct(d)}%"></div><div class="collabel">${d.label}</div></div>`).join('')}</div></section><section class="card span-8"><div class="section-title"><h2>${current.label}. ${fmtDate(current.date)} · Tagesprotokoll</h2><span class="tag">${current.status==='current'?'AKTUELL':'VIEW'}</span></div><div class="timeline">${current.entries.length?current.entries.map(e=>`<div class="entry"><div class="time">${e.time}</div><div><h3>${e.title}</h3><p>${e.text}</p></div><div class="badge ${cls(e.type)}">${e.rating}</div></div>`).join(''):'<div class="hint">Noch keine Einträge.</div>'}</div></section><aside class="card span-4"><div class="section-title"><h2>Daily Checks</h2></div><div class="checks">${Object.keys(labels).map(k=>`<div class="check">${labels[k]} <span class="dot ${checks[k]?'done':'open'}"></span></div>`).join('')}</div></aside><section class="card span-8"><div class="section-title"><h2>Fazit</h2></div><div class="summary"><strong>${current.score>=9?'Du bist auf Kurs.':'Aktueller Stand.'}</strong><p>${current.summary}</p></div></section><aside class="card span-4"><div class="section-title"><h2>Nächster Move</h2></div><div class="rules">${data.rules.map(r=>`<div class="rule"><strong>${r.title}:</strong>${r.text}</div>`).join('')}</div></aside></main>`}fetch('data.json?ts='+Date.now()).then(r=>r.json()).then(d=>{DATA=d;render(d.currentDay)}).catch(()=>{document.getElementById('app').innerHTML='<div class="card">data.json konnte nicht geladen werden.</div>'})</script></body></html>
