<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mika, dein Weg</title><style>:root{--bg:#f4efe6;--card:#fffaf3;--ink:#171717;--muted:#746d63;--line:#ded2c1;--good:#257a55;--ok:#bd8427;--bad:#b84a3a;--soft:#eee4d5;--shadow:0 16px 45px rgba(42,32,20,.08)}*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 0 0,#fff9ed 0,#f4efe6 38%,#ede4d7 100%);color:var(--ink);line-height:1.45}.wrap{max-width:1180px;margin:0 auto;padding:22px 16px 56px}.sticky{position:sticky;top:0;z-index:20;margin:-22px -16px 18px;padding:12px 16px;background:rgba(244,239,230,.88);backdrop-filter:blur(18px);border-bottom:1px solid rgba(222,210,193,.75)}.stick-inner{max-width:1180px;margin:auto;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}.brand{font-weight:950;letter-spacing:-.04em;font-size:22px}.next-inline{color:var(--muted);font-size:13px;font-weight:800}.mini-score{font-weight:950;background:#111;color:#fff;border-radius:999px;padding:9px 13px}.hero{display:grid;grid-template-columns:1.05fr .95fr;gap:18px;margin-bottom:18px}.panel,.card{background:rgba(255,250,243,.95);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.panel{padding:26px}.eyebrow{font-size:12px;font-weight:950;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}h1{margin:0 0 10px;font-size:clamp(38px,5vw,64px);letter-spacing:-.065em;line-height:.92}.sub{color:var(--muted);font-size:17px;max-width:720px}.score-box{display:grid;grid-template-columns:160px 1fr;gap:18px;align-items:center}.ring{--p:90;width:156px;height:156px;border-radius:50%;background:conic-gradient(var(--good) calc(var(--p)*1%),#e9ddcc 0);display:grid;place-items:center}.inner{width:116px;height:116px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center}.score{font-size:42px;font-weight:950;letter-spacing:-.06em}.label{font-size:12px;color:var(--muted);font-weight:900}.status{font-size:26px;font-weight:950;letter-spacing:-.04em;margin:0 0 6px}.small{color:var(--muted);font-size:14px}.progress{margin-top:16px}.progress-top{display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:13px;margin-bottom:8px}.progressbar{height:13px;background:#e9ddcc;border-radius:999px;overflow:hidden}.progressbar span{display:block;height:100%;background:linear-gradient(90deg,var(--good),#111);border-radius:999px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}.card{padding:22px}.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-4{grid-column:span 4}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}h2{margin:0;font-size:21px;letter-spacing:-.035em}.tag{font-size:12px;font-weight:950;border-radius:999px;padding:7px 11px;background:#111;color:#fff}.coach{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.coach-card{border-radius:20px;border:1px solid var(--line);background:#faf4ea;padding:16px}.coach-card strong{display:block;font-size:15px;margin-bottom:5px}.coach-card p{margin:0;color:var(--muted);font-size:14px}.danger{background:#fff0e9}.win{background:#eaf3ee}.next{background:#f9efd9}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{font-size:13px;font-weight:850;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:#faf4ea}.chip.done{background:#e5f1ea;color:var(--good)}.chip.open{background:#fff2d8;color:var(--ok)}.timeline{display:grid;gap:11px}.entry{display:grid;grid-template-columns:86px 1fr 72px;gap:14px;padding:14px;border-radius:18px;background:#faf7f1;border:1px solid var(--line)}.time{font-weight:950}.entry h3{margin:0 0 3px;font-size:16px}.entry p{margin:0;color:var(--muted);font-size:14px}.badge{justify-self:end;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:950}.good{color:var(--good);background:#e4f1ea}.ok{color:var(--ok);background:#fff1d5}.bad{color:var(--bad);background:#fbe5df}.week{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.bars{height:150px;display:flex;align-items:end;gap:10px;padding:14px;background:#faf4ea;border:1px solid var(--line);border-radius:18px}.col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px}.colbar{width:100%;max-width:32px;background:linear-gradient(180deg,#111,#6f665b);border-radius:9px 9px 3px 3px;min-height:4px}.collabel{font-size:11px;color:var(--muted);font-weight:850}.kpis{display:grid;gap:10px}.kpi{border-radius:18px;border:1px solid var(--line);background:#faf4ea;padding:14px}.num{font-size:24px;font-weight:950;letter-spacing:-.04em}.lab{font-size:12px;color:var(--muted);font-weight:850}.days-mini{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px}.daydot{min-width:52px;border:1px solid var(--line);background:#faf4ea;border-radius:15px;padding:8px;text-align:center;font-weight:900;font-size:12px}.daydot.active{background:#111;color:#fff}.loader{padding:40px;color:var(--muted)}@media(max-width:900px){.wrap{padding:14px 12px 44px}.sticky{margin:-14px -12px 14px;padding:10px 12px}.stick-inner{grid-template-columns:1fr}.mini-score{justify-self:start}.hero,.score-box,.coach,.week{grid-template-columns:1fr}.ring{width:138px;height:138px}.inner{width:102px;height:102px}.span-8,.span-4{grid-column:span 12}.entry{grid-template-columns:1fr}.badge{justify-self:start}.top-hide-mobile{display:none}.card,.panel{border-radius:22px;padding:18px}h1{font-size:42px}.grid{gap:14px}}</style></head><body><div id="app" class="wrap"><div class="loader">Cockpit lädt…</div></div><script>const labels={wasser:'Wasser',protein:'Protein',bewegung:'Bewegung',kraftreiz:'Kraftreiz',keinZuckerkaffee:'Kein Zuckerkaffee',keinSnackMuell:'Kein Snack-Müll',abendKontrolliert:'Abend kontrolliert',schlafVorbereiten:'Schlaf vorbereiten'};let DATA;function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('de-AT',{day:'2-digit',month:'short'}).replace('.','')}function score(d){return d.score??0}function pct(d){return Math.max(0,Math.min(100,score(d)*10))}function scoreText(d){return d.score==null?'offen':d.score+'/10'}function cls(t){return t==='bad'?'bad':t==='ok'?'ok':'good'}function avg(days){const s=days.filter(d=>d.score!=null).map(d=>d.score);return s.length?(s.reduce((a,b)=>a+b,0)/s.length).toFixed(1):'-'}function streak(days){let n=0;for(let i=0;i<days.length;i++){if(days[i].score>=8)n++;else if(days[i].score!=null)n=0}return n}function derive(current){const c=current.checks||{};const done=Object.entries(c).filter(([k,v])=>v).map(([k])=>labels[k]);const open=Object.entries(labels).filter(([k])=>!c[k]).map(([k,v])=>v);let next='Leichtes Abendessen + Protein. Kein Belohnungsessen.';if(!c.protein)next='Protein sichern: Skyr, Shake, Huhn, Eier oder Hüttenkäse.';else if(!c.abendKontrolliert)next='Abend kontrollieren: leicht essen, kein Snack aus Gewohnheit.';else if(!c.schlafVorbereiten)next='Runterfahren: Wasser, Bildschirm reduzieren, Schlaf vorbereiten.';let risk=!c.abendKontrolliert?'Der Abend ist der kritische Punkt. Nicht kompensieren, nicht belohnen.':'Nur noch sauber landen und Schlaf schützen.';let outlook=current.score>=9?'Wenn du heute sauber abschließt, baust du echten Rückenwind für morgen auf. Kleine Schritte, kein Drama.':'Heute nicht retten wollen. Einen sauberen nächsten Schritt setzen.';return{done,open,next,risk,outlook,doneCount:done.length,total:Object.keys(labels).length}}function render(dayId){const data=DATA;const current=data.days.find(d=>d.date===dayId)||data.days.find(d=>d.status==='current')||data.days[0];const d=derive(current);const app=document.getElementById('app');app.innerHTML=`<div class="sticky"><div class="stick-inner"><div><div class="brand">Mika, dein Weg.</div><div class="next-inline">Nächster Schritt: ${d.next}</div></div><div class="mini-score">${scoreText(current)}</div></div></div><section class="hero"><div class="panel"><div class="eyebrow">Heute · persönlich · ehrlich</div><h1>Mika, dein Weg.</h1><div class="sub">Nicht perfekt sein. Sichtbar besser werden. Heute zählt nur der nächste saubere Schritt.</div><div class="progress"><div class="progress-top"><span>Heute geschafft</span><span>${d.doneCount}/${d.total}</span></div><div class="progressbar"><span style="width:${(d.doneCount/d.total)*100}%"></span></div></div></div><div class="panel score-box"><div class="ring" style="--p:${pct(current)}"><div class="inner"><div><div class="label">Score</div><div class="score">${scoreText(current)}</div></div></div></div><div><div class="status">${current.score>=9?'Starker Kurs.':current.score>=7?'Solide Basis.':'Offener Tag.'}</div><div class="small">${current.label}. ${fmtDate(current.date)} · laufend aktualisiert</div><div class="days-mini" style="margin-top:14px">${data.days.map(x=>`<div onclick="render('${x.date}')" class="daydot ${x.date===current.date?'active':''}">${x.label}<br>${scoreText(x)}</div>`).join('')}</div></div></div></section><main class="grid"><section class="card span-12"><div class="section-title"><h2>Coach Board</h2><span class="tag">JETZT</span></div><div class="coach"><div class="coach-card win"><strong>Geschafft</strong><p>${d.done.slice(0,4).join(', ')||'Noch nichts eingetragen.'}</p></div><div class="coach-card danger"><strong>Achtung heute</strong><p>${d.risk}</p></div><div class="coach-card next"><strong>Ausblick</strong><p>${d.outlook}</p></div></div></section><section class="card span-8"><div class="section-title"><h2>Tagesprotokoll</h2><span class="tag">${current.status==='current'?'AKTUELL':'VIEW'}</span></div><div class="timeline">${current.entries.length?current.entries.map(e=>`<div class="entry"><div class="time">${e.time}</div><div><h3>${e.title}</h3><p>${e.text}</p></div><div class="badge ${cls(e.type)}">${e.rating}</div></div>`).join(''):'<div class="small">Noch keine Einträge.</div>'}</div></section><aside class="card span-4"><div class="section-title"><h2>Checks</h2><span class="small">offen: ${d.open.length}</span></div><div class="chips">${Object.keys(labels).map(k=>`<span class="chip ${current.checks&&current.checks[k]?'done':'open'}">${labels[k]}</span>`).join('')}</div></aside><section class="card span-12"><div class="section-title"><h2>Woche kompakt</h2><span class="small">unten, nicht im Weg</span></div><div class="week"><div class="bars">${data.days.map(x=>`<div class="col"><div class="colbar" style="height:${pct(x)}%"></div><div class="collabel">${x.label}</div></div>`).join('')}</div><div class="kpis"><div class="kpi"><div class="num">${avg(data.days)}</div><div class="lab">Ø Score</div></div><div class="kpi"><div class="num">${data.days.filter(x=>x.score>=8).length}</div><div class="lab">starke Tage</div></div><div class="kpi"><div class="num">${streak(data.days)}</div><div class="lab">Streak</div></div></div></div></section></main>`}fetch('data.json?ts='+Date.now()).then(r=>r.json()).then(d=>{DATA=d;render(d.currentDay)}).catch(()=>{document.getElementById('app').innerHTML='<div class="card">data.json konnte nicht geladen werden.</div>'})</script></body></html>
