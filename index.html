<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Mika, dein Weg</title><style>:root{--bg:#f4efe6;--card:#fffaf3;--ink:#151515;--muted:#736c62;--line:#ded2c1;--good:#257a55;--ok:#bd8427;--bad:#b84a3a;--soft:#eee4d5;--shadow:0 14px 38px rgba(42,32,20,.08)}*{box-sizing:border-box}html,body{margin:0;max-width:100%;overflow-x:hidden}body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 0 0,#fff9ed 0,#f4efe6 42%,#ede4d7 100%);color:var(--ink);line-height:1.42}.wrap{width:100%;max-width:1120px;margin:0 auto;padding:16px 14px 54px}.sticky{position:sticky;top:0;z-index:50;margin:0 -14px 14px;padding:10px 14px;background:rgba(244,239,230,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(222,210,193,.75)}.stick-inner{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand{font-weight:950;letter-spacing:-.04em;font-size:20px}.next-inline{color:var(--muted);font-size:13px;font-weight:800;line-height:1.3;max-width:72vw}.mini-score{font-weight:950;background:#111;color:#fff;border-radius:999px;padding:8px 12px;white-space:nowrap}.panel,.card{width:100%;max-width:100%;background:rgba(255,250,243,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.hero{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.panel{padding:22px}.eyebrow{font-size:12px;font-weight:950;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}h1{margin:0 0 8px;font-size:clamp(34px,5vw,58px);letter-spacing:-.065em;line-height:.92}.sub{color:var(--muted);font-size:16px;max-width:720px}.progress{margin-top:16px}.progress-top{display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:13px;margin-bottom:8px}.progressbar{height:12px;background:#e9ddcc;border-radius:999px;overflow:hidden}.progressbar span{display:block;height:100%;background:linear-gradient(90deg,var(--good),#111);border-radius:999px}.score-box{display:grid;grid-template-columns:126px 1fr;gap:14px;align-items:center}.ring{--p:90;width:126px;height:126px;border-radius:50%;background:conic-gradient(var(--good) calc(var(--p)*1%),#e9ddcc 0);display:grid;place-items:center;flex:0 0 auto}.inner{width:92px;height:92px;border-radius:50%;background:var(--card);display:grid;place-items:center;text-align:center}.score{font-size:34px;font-weight:950;letter-spacing:-.06em}.label{font-size:11px;color:var(--muted);font-weight:900}.status{font-size:24px;font-weight:950;letter-spacing:-.04em;margin:0 0 4px}.small{color:var(--muted);font-size:14px}.days-mini{display:flex;gap:7px;overflow-x:auto;padding:8px 1px 2px;margin-top:10px;-webkit-overflow-scrolling:touch}.daydot{min-width:54px;border:1px solid var(--line);background:#faf4ea;border-radius:14px;padding:8px;text-align:center;font-weight:900;font-size:12px;cursor:pointer}.daydot.active{background:#111;color:#fff}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{padding:18px}.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-4{grid-column:span 4}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}h2{margin:0;font-size:20px;letter-spacing:-.035em}.tag{font-size:12px;font-weight:950;border-radius:999px;padding:7px 10px;background:#111;color:#fff}.reality{display:grid;grid-template-columns:1.1fr .9fr .9fr;gap:10px}.reality-card{border-radius:18px;border:1px solid var(--line);background:#faf4ea;padding:16px;min-height:116px}.reality-card strong{display:block;font-size:14px;margin-bottom:7px}.reality-card p{margin:0;color:var(--muted);font-size:14px}.reality-card.big{background:#111;color:#fff}.quote{font-size:26px;font-weight:950;letter-spacing:-.05em;line-height:1.04;margin-top:6px}.danger{background:#fff0e9}.next{background:#f9efd9}.timeline{display:grid;gap:10px}.entry{display:grid;grid-template-columns:80px 1fr 68px;gap:12px;padding:13px;border-radius:17px;background:#faf7f1;border:1px solid var(--line)}.time{font-weight:950}.entry h3{margin:0 0 3px;font-size:16px}.entry p{margin:0;color:var(--muted);font-size:14px}.badge{justify-self:end;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:950;white-space:nowrap}.good{color:var(--good);background:#e4f1ea}.ok{color:var(--ok);background:#fff1d5}.bad{color:var(--bad);background:#fbe5df}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{font-size:13px;font-weight:850;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:#faf4ea}.chip.done{background:#e5f1ea;color:var(--good)}.chip.open{background:#fff2d8;color:var(--ok)}.loader{padding:40px;color:var(--muted)}@media(max-width:900px){.wrap{padding:0 12px 44px}.sticky{margin:0 -12px 12px;padding:12px}.stick-inner{display:grid;grid-template-columns:1fr auto}.hero{grid-template-columns:1fr;gap:12px;margin-bottom:12px}.panel,.card{border-radius:22px;padding:16px}.hero .panel:first-child{order:2}.score-box{order:1;grid-template-columns:104px 1fr}.ring{width:104px;height:104px}.inner{width:78px;height:78px}.score{font-size:27px}.status{font-size:30px;line-height:.95}.sub{font-size:15px}.eyebrow{font-size:11px}.progressbar{height:11px}.span-8,.span-4{grid-column:span 12}.reality{grid-template-columns:1fr}.reality-card{min-height:auto}.quote{font-size:25px}.entry{grid-template-columns:1fr;gap:6px}.badge{justify-self:start}.days-mini{margin-left:-2px;margin-right:-2px}.daydot{min-width:58px}.section-title{align-items:flex-start}h2{font-size:19px}.grid{gap:12px}.next-inline{max-width:100%;font-size:12px}.mini-score{padding:8px 11px}}@media(max-width:430px){.wrap{padding-left:10px;padding-right:10px}.sticky{margin-left:-10px;margin-right:-10px}.brand{font-size:19px}.panel,.card{padding:15px;border-radius:21px}h1{font-size:39px}.score-box{grid-template-columns:96px 1fr}.ring{width:96px;height:96px}.inner{width:72px;height:72px}.score{font-size:25px}.status{font-size:28px}.quote{font-size:23px}.days-mini{gap:6px}.daydot{min-width:55px;padding:7px 6px}}</style></head><body><div id="app" class="wrap"><div class="loader">Cockpit lädt…</div></div><script>const labels={wasser:'Wasser',protein:'Protein',bewegung:'Bewegung',kraftreiz:'Kraftreiz',keinZuckerkaffee:'Kein Zuckerkaffee',keinSnackMuell:'Kein Snack-Müll',abendKontrolliert:'Abend kontrolliert',schlafVorbereiten:'Schlaf vorbereiten'};let DATA;function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('de-AT',{day:'2-digit',month:'short'}).replace('.','')}function score(d){return d.score??0}function pct(d){return Math.max(0,Math.min(100,score(d)*10))}function scoreText(d){return d.score==null?'offen':d.score+'/10'}function cls(t){return t==='bad'?'bad':t==='ok'?'ok':'good'}function avg(days){const s=days.filter(d=>d.score!=null).map(d=>d.score);return s.length?(s.reduce((a,b)=>a+b,0)/s.length).toFixed(1):'-'}function streak(days){let n=0;for(const day of days){if(day.score>=8)n++;else if(day.score!=null)n=0}return n}function derive(current,data){const c=current.checks||{};const done=Object.entries(c).filter(([k,v])=>v).map(([k])=>labels[k]);const open=Object.entries(labels).filter(([k])=>!c[k]).map(([k,v])=>v);let next='Leichtes Abendessen + Protein. Kein Belohnungsessen.';if(!c.protein)next='Protein sichern: Skyr, Shake, Huhn, Eier oder Hüttenkäse.';else if(!c.abendKontrolliert)next='Abend kontrollieren: leicht essen, kein Snack aus Gewohnheit.';else if(!c.schlafVorbereiten)next='Runterfahren: Wasser, Bildschirm reduzieren, Schlaf vorbereiten.';let st=streak(data.days), av=avg(data.days);let quote='Nicht perfekt. Stabil.';if(st>=2)quote='Du bist raus aus dem Zufallsmodus.';if(!c.abendKontrolliert)quote='Heute wird am Abend gewonnen.';let realityTop=`${st} starke Tage in Folge. Ø Score ${av}. Das ist kein Zufall mehr, aber auch noch kein Selbstläufer.`;let realityMid=!c.abendKontrolliert?'Dein Risiko liegt nicht beim Start in den Tag. Es liegt beim späten Belohnungsimpuls. Genau dort musst du heute wach bleiben.':'Der kritische Teil ist erledigt. Jetzt nur nicht unnötig öffnen.';let realityLow=current.score>=9?'Kleiner Schritt: heute sauber landen. Morgen nicht neu anfangen, sondern weitergehen.':'Kleiner Schritt: eine saubere Entscheidung jetzt. Nicht den ganzen Tag retten wollen.';return{done,open,next,quote,realityTop,realityMid,realityLow,doneCount:done.length,total:Object.keys(labels).length}}function render(dayId){const data=DATA;const current=data.days.find(d=>d.date===dayId)||data.days.find(d=>d.status==='current')||data.days[0];const d=derive(current,data);document.getElementById('app').innerHTML=`<div class="sticky"><div class="stick-inner"><div><div class="brand">Mika, dein Weg.</div><div class="next-inline">${d.next}</div></div><div class="mini-score">${scoreText(current)}</div></div></div><section class="hero"><div class="panel"><div class="eyebrow">Heute · ehrlich · klar</div><h1>Mika, dein Weg.</h1><div class="sub">Nicht perfekt sein. Sichtbar besser werden. Heute zählt nur der nächste saubere Schritt.</div><div class="progress"><div class="progress-top"><span>Heute geschafft</span><span>${d.doneCount}/${d.total}</span></div><div class="progressbar"><span style="width:${(d.doneCount/d.total)*100}%"></span></div></div></div><div class="panel score-box"><div class="ring" style="--p:${pct(current)}"><div class="inner"><div><div class="label">Score</div><div class="score">${scoreText(current)}</div></div></div></div><div><div class="status">${current.score>=9?'Starker Kurs.':current.score>=7?'Solide Basis.':'Offener Tag.'}</div><div class="small">${current.label}. ${fmtDate(current.date)} · laufend aktualisiert</div><div class="days-mini">${data.days.map(x=>`<div onclick="render('${x.date}')" class="daydot ${x.date===current.date?'active':''}">${x.label}<br>${scoreText(x)}</div>`).join('')}</div></div></div></section><main class="grid"><section class="card span-12"><div class="section-title"><h2>Reality Mode</h2><span class="tag">SPIEGEL</span></div><div class="reality"><div class="reality-card big"><strong>Abriss</strong><div class="quote">${d.quote}</div></div><div class="reality-card danger"><strong>Wo du stehst</strong><p>${d.realityTop}</p></div><div class="reality-card next"><strong>Nächster kleiner Schritt</strong><p>${d.realityLow}</p></div></div></section><section class="card span-8"><div class="section-title"><h2>Tagesprotokoll</h2><span class="tag">${current.status==='current'?'AKTUELL':'VIEW'}</span></div><div class="timeline">${current.entries.length?current.entries.map(e=>`<div class="entry"><div class="time">${e.time}</div><div><h3>${e.title}</h3><p>${e.text}</p></div><div class="badge ${cls(e.type)}">${e.rating}</div></div>`).join(''):'<div class="small">Noch keine Einträge.</div>'}</div></section><aside class="card span-4"><div class="section-title"><h2>Checks</h2><span class="small">offen: ${d.open.length}</span></div><div class="chips">${Object.keys(labels).map(k=>`<span class="chip ${current.checks&&current.checks[k]?'done':'open'}">${labels[k]}</span>`).join('')}</div></aside><section class="card span-12"><div class="section-title"><h2>Engpass</h2><span class="tag">EHRLICH</span></div><p class="small">${d.realityMid}</p></section></main>`}fetch('data.json?ts='+Date.now()).then(r=>r.json()).then(d=>{DATA=d;render(d.currentDay)}).catch(()=>{document.getElementById('app').innerHTML='<div class="card">data.json konnte nicht geladen werden.</div>'})</script></body></html>
