<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mika Shape Cockpit</title><style>:root{--bg:#f5f1ea;--card:#fff;--ink:#1f1f1f;--muted:#77736b;--line:#e1d9cc;--good:#2e7d55;--ok:#c28b22;--bad:#b84a3a;--accent:#111;--soft:#f0ebe2}*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.45}.wrap{max-width:1180px;margin:0 auto;padding:28px 18px 60px}header{display:grid;grid-template-columns:1.3fr .7fr;gap:18px;margin-bottom:18px}.hero,.scorebox,.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 12px 30px rgba(40,32,20,.06)}.hero{padding:28px}.scorebox{padding:24px;display:flex;flex-direction:column;justify-content:space-between}h1{margin:0 0 8px;font-size:clamp(30px,5vw,54px);letter-spacing:-.04em;line-height:.95}.sub{color:var(--muted);font-size:17px;max-width:720px}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}.pill{border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:8px 12px;font-size:13px;color:#36322d;font-weight:700}.bigscore{font-size:58px;font-weight:850;letter-spacing:-.05em;line-height:.95}.scorelabel{color:var(--muted);font-size:14px;margin-bottom:10px}.scoretext{font-weight:800;margin-top:10px}.footer-note{margin-top:18px;color:var(--muted);font-size:13px}.day-tabs{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;margin-bottom:18px}.day-tab{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 12px;min-height:88px}.day-tab.active{border:2px solid var(--accent)}.day{font-weight:850;font-size:15px}.date{color:var(--muted);font-size:12px;margin-top:3px}.mini-score{margin-top:12px;font-weight:850;font-size:20px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}.card{padding:20px}.span-8{grid-column:span 8}.span-4{grid-column:span 4}.span-12{grid-column:span 12}.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}h2{margin:0;font-size:20px;letter-spacing:-.02em}.tag{font-size:12px;font-weight:850;border-radius:999px;padding:6px 10px;background:#111;color:white}.timeline{display:grid;gap:12px}.entry{display:grid;grid-template-columns:96px 1fr 86px;gap:14px;padding:14px;border-radius:16px;background:#faf8f4;border:1px solid var(--line);align-items:start}.time{font-weight:850;color:#3a362f}.entry h3{margin:0 0 4px;font-size:16px}.entry p{margin:0;color:var(--muted);font-size:14px}.badge{justify-self:end;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:850;text-align:center;white-space:nowrap}.good{color:var(--good);background:#e8f3ed}.ok{color:var(--ok);background:#fff5df}.bad{color:var(--bad);background:#fbe9e6}.checks{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.check{padding:12px;border-radius:14px;border:1px solid var(--line);background:#faf8f4;display:flex;justify-content:space-between;align-items:center;gap:10px;font-weight:750;font-size:14px}.dot{width:12px;height:12px;border-radius:50%;background:var(--line);flex:0 0 12px}.dot.done{background:var(--good)}.dot.open{background:var(--ok)}.summary{background:#111;color:white;border-radius:18px;padding:18px}.summary p{color:#ddd;margin:8px 0 0}.rules{display:grid;gap:10px}.rule{padding:14px;border-radius:14px;background:var(--soft);border:1px solid var(--line);font-size:14px}.rule strong{display:block;margin-bottom:3px}.loader{padding:40px;color:var(--muted)}@media(max-width:860px){header{grid-template-columns:1fr}.span-8,.span-4{grid-column:span 12}.day-tabs{grid-template-columns:repeat(2,minmax(0,1fr))}.entry{grid-template-columns:1fr}.badge{justify-self:start}.checks{grid-template-columns:1fr}}</style></head><body><div id="app" class="wrap"><div class="loader">Cockpit lädt…</div></div><script>const labels={wasser:'Wasser',protein:'Protein',bewegung:'Bewegung',kraftreiz:'Kraftreiz',keinZuckerkaffee:'Kein Zuckerkaffee',keinSnackMuell:'Kein Snack-Müll',abendKontrolliert:'Abend kontrolliert',schlafVorbereiten:'Schlaf vorbereiten'};function fmtDate(d){const x=new Date(d+'T00:00:00');return x.toLocaleDateString('de-AT',{day:'2-digit',month:'short'}).replace('.','.') }function scoreText(day){return day.score===null||day.score===undefined?'offen':day.score+'/10'}function cls(type){return type==='bad'?'bad':type==='ok'?'ok':'good'}fetch('data.json?ts='+Date.now()).then(r=>r.json()).then(data=>{const app=document.getElementById('app');const current=data.days.find(d=>d.status==='current')||data.days[data.days.length-1];const closed=data.days.filter(d=>d.status==='closed').slice(-1)[0];const checks=current.checks||{};app.innerHTML=`<header><section class="hero"><h1>Shape Cockpit</h1><div class="sub">Visuelles Tages- und Wochenprotokoll für Ernährung, Bewegung, Training und Entscheidungen. Fokus: Fett runter, Form rauf, Alltag kontrollieren.</div><div class="meta">${data.profile.principles.map(p=>`<div class="pill">${p}</div>`).join('')}<div class="pill">${data.profile.goal}</div><div class="pill">${data.profile.age} Jahre</div></div></section><aside class="scorebox"><div><div class="scorelabel">Aktueller Tag · Zwischenstand</div><div class="bigscore">${scoreText(current)}</div><div class="scoretext">${current.score>=9?'Sehr sauberer Tag im Aufbau':current.score>=7?'Guter Tag mit Luft nach oben':'Tag offen'}</div></div><div class="footer-note">Stand: ${current.label}. ${fmtDate(current.date)} · laufend aktualisiert</div></aside></header><section class="day-tabs">${data.days.map(d=>`<div class="day-tab ${d.status==='current'?'active':''}"><div class="day">${d.label}</div><div class="date">${fmtDate(d.date)}</div><div class="mini-score">${scoreText(d)}</div></div>`).join('')}</section><main class="grid"><section class="card span-8"><div class="section-title"><h2>${current.label}. ${fmtDate(current.date)} · Tagesprotokoll</h2><span class="tag">AKTUELL</span></div><div class="timeline">${current.entries.map(e=>`<div class="entry"><div class="time">${e.time}</div><div><h3>${e.title}</h3><p>${e.text}</p></div><div class="badge ${cls(e.type)}">${e.rating}</div></div>`).join('')}</div></section><aside class="card span-4"><div class="section-title"><h2>Daily Checks</h2></div><div class="checks">${Object.keys(labels).map(k=>`<div class="check">${labels[k]} <span class="dot ${checks[k]?'done':'open'}"></span></div>`).join('')}</div></aside><section class="card span-8"><div class="section-title"><h2>Zwischenfazit heute</h2></div><div class="summary"><strong>${current.score>=9?'Sehr starker Tag. Du bist nicht mehr im Zufallsmodus.':'Aktueller Zwischenstand.'}</strong><p>${current.summary}</p></div></section><aside class="card span-4"><div class="section-title"><h2>Nächster Move</h2></div><div class="rules">${data.rules.map(r=>`<div class="rule"><strong>${r.title}:</strong>${r.text}</div>`).join('')}</div></aside>${closed?`<section class="card span-12"><div class="section-title"><h2>${closed.label}. ${fmtDate(closed.date)} · abgeschlossen</h2><span class="tag">${scoreText(closed)}</span></div><div class="timeline">${closed.entries.map(e=>`<div class="entry"><div class="time">${e.time}</div><div><h3>${e.title}</h3><p>${e.text}</p></div><div class="badge ${cls(e.type)}">${e.rating}</div></div>`).join('')}</div></section>`:''}</main>`}).catch(()=>{document.getElementById('app').innerHTML='<div class="card">data.json konnte nicht geladen werden.</div>'})</script></body></html>
