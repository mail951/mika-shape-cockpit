<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mika Shape Cockpit</title><style>body{font-family:sans-serif;background:#f5f1ea;margin:0;padding:20px;color:#111}.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:15px}h1{margin:0}.grid{display:grid;gap:10px}</style></head><body><h1>Shape Cockpit V2</h1><div id="app"></div><script>fetch('data.json').then(r=>r.json()).then(data=>{const app=document.getElementById('app');const current=data.days.find(d=>d.status==='current');app.innerHTML=`<div class='card'><h2>Score: ${current.score||'-'}/10</h2><p>${current.summary}</p></div><div class='card'><h3>Entries</h3>${current.entries.map(e=>`<div><strong>${e.time}:</strong> ${e.title} (${e.rating})</div>`).join('')}</div><div class='card'><h3>Next Moves</h3>${data.rules.map(r=>`<div><strong>${r.title}:</strong> ${r.text}</div>`).join('')}</div>`})</script></body></html>
